{{ partial "header.html" .}}

    <!-- Page Header -->
    <header class="intro-header">
     <div class="container">
       <div class="row">
         <div class="col-lg-8 col-lg-offset-2 col-md-8 col-md-offset-2">
            <h3>
              <small>
                <strong><a href="{{ .Site.Params.Baseurl }}/" class="uncolored">Blog</a></strong> •
                <strong><a href="{{ .Site.Params.Baseurl }}/projects" class="uncolored">Projects</a></strong> •
                <strong><a href="{{ .Site.Params.Baseurl }}/oss" class="uncolored">OSS</a></strong> •
                <strong><a href="{{ .Site.Params.Baseurl }}/about" class="uncolored">About</a></strong>
              </small>
            </h3>
             <h1 class="title text-center">{{ title .Title }}{{ with .Params.subtitle }}<br>{{ . }}{{ end }}</h1>
             <hr class="small">
         </div>
       </div>
     </div>
    </header>

    <!-- Post Content -->
    <article class="markdown-body">
        <div class="container">
            <div class="row">
                <div class="col-lg-8 col-lg-offset-2 col-md-8 col-md-offset-2">
                  {{ .Content }}

                  {{ if isset .Params "comments" }}
                    {{ partial "comments.html" .}}
                  {{ end }}
                </div>
            </div>
        </div>
    </article>

{{ partial "footer.html" .}}
